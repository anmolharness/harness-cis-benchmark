apiVersion: v1
kind: Service
metadata:
  name: harness-cis-dashboard
  namespace: harness-cis
  labels:
    app: harness-cis-dashboard
spec:
  type: NodePort
  selector:
    app: harness-cis-dashboard
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    nodePort: 30500  # Accessible at <node-ip>:30500
    protocol: TCP
